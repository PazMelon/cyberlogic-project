<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cyberlogic Club Portal — The premier student cybersecurity and technology club. Learn, compete, collaborate, and grow." />
    <title>Cyberlogic Club Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem("cl-theme") || localStorage.getItem("cl-default-theme") || "cyberpunk";
          const normalizedTheme = savedTheme.replace("_", "-");
          document.documentElement.setAttribute("data-theme", normalizedTheme);
          const presets = {
            cyber: { primary: "#06b6d4", primaryLight: "#22d3ee", primaryDark: "#0891b2", accent: "#a855f7", surface950: "#0a0e1a", surface900: "#0f1729", surface800: "#151d33" },
            cyberpunk: { primary: "#06b6d4", primaryLight: "#22d3ee", primaryDark: "#0891b2", accent: "#a855f7", surface950: "#0a0e1a", surface900: "#0f1729", surface800: "#151d33" },
            matrix: { primary: "#22c55e", primaryLight: "#4ade80", primaryDark: "#16a34a", accent: "#10b981", surface950: "#030804", surface900: "#061208", surface800: "#0a1d0d" },
            amber: { primary: "#f59e0b", primaryLight: "#fbbf24", primaryDark: "#d97706", accent: "#ea580c", surface950: "#0d0702", surface900: "#160d04", surface800: "#231407" },
            rose: { primary: "#f43f5e", primaryLight: "#fb7185", primaryDark: "#e11d48", accent: "#d946ef", surface950: "#0e0207", surface900: "#17040d", surface800: "#250616" },
            royal: { primary: "#3b82f6", primaryLight: "#60a5fa", primaryDark: "#2563eb", accent: "#6366f1", surface950: "#030712", surface900: "#0b0f19", surface800: "#121824" },
            slate: { primary: "#38bdf8", primaryLight: "#7dd3fc", primaryDark: "#0284c7", accent: "#64748b", surface950: "#030712", surface900: "#0f172a", surface800: "#1e293b" },
            glass: { primary: "#6366f1", primaryLight: "#818cf8", primaryDark: "#4f46e5", accent: "#ec4899", surface950: "#030712", surface900: "#0b0f19", surface800: "#121824" },
            "maroon-spider": { primary: "#881337", primaryLight: "#be123c", primaryDark: "#4c0519", accent: "#dc2626", surface950: "#040102", surface900: "#0d0407", surface800: "#190a10" },
            maroon_spider: { primary: "#881337", primaryLight: "#be123c", primaryDark: "#4c0519", accent: "#dc2626", surface950: "#040102", surface900: "#0d0407", surface800: "#190a10" },
            "light-classic": { primary: "#d97706", primaryLight: "#f59e0b", primaryDark: "#b45309", accent: "#4f46e5", surface950: "#f8fafc", surface900: "#f1f5f9", surface800: "#e2e8f0" },
            light_classic: { primary: "#d97706", primaryLight: "#f59e0b", primaryDark: "#b45309", accent: "#4f46e5", surface950: "#f8fafc", surface900: "#f1f5f9", surface800: "#e2e8f0" },
            "light-neo": { primary: "#0891b2", primaryLight: "#06b6d4", primaryDark: "#0e7490", accent: "#db2777", surface950: "#ffffff", surface900: "#fafafa", surface800: "#f5f5f5" },
            light_neo: { primary: "#0891b2", primaryLight: "#06b6d4", primaryDark: "#0e7490", accent: "#db2777", surface950: "#ffffff", surface900: "#fafafa", surface800: "#f5f5f5" }
          };
          const p = presets[savedTheme] || presets[normalizedTheme];
          if (p) {
            document.documentElement.style.setProperty("--cl-primary", p.primary);
            document.documentElement.style.setProperty("--cl-primary-light", p.primaryLight);
            document.documentElement.style.setProperty("--cl-primary-dark", p.primaryDark);
            document.documentElement.style.setProperty("--cl-accent", p.accent);
            document.documentElement.style.setProperty("--cl-surface-950", p.surface950);
            document.documentElement.style.setProperty("--cl-surface-900", p.surface900);
            document.documentElement.style.setProperty("--cl-surface-800", p.surface800);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- Loading Screen Styles — scoped to #cl-loader, zero external dependencies -->
    <style>
      #cl-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at 50% 40%,
          var(--cl-surface-900, #0f1729) 0%,
          var(--cl-surface-950, #0a0e1a) 70%
        );
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }

      /* Subtle background grid pattern */
      #cl-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(
            var(--cl-border-light, rgba(148,163,184,0.05)) 1px,
            transparent 1px
          ),
          linear-gradient(
            90deg,
            var(--cl-border-light, rgba(148,163,184,0.05)) 1px,
            transparent 1px
          );
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      }

      /* Ambient glow behind logo */
      #cl-loader::after {
        content: '';
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          color-mix(in srgb, var(--cl-primary, #06b6d4) 18%, transparent) 0%,
          color-mix(in srgb, var(--cl-accent, #a855f7) 8%, transparent) 50%,
          transparent 70%
        );
        filter: blur(40px);
        animation: cl-ambient 4s ease-in-out infinite;
      }

      /* Logo container */
      .cl-logo-wrap {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }

      /* The SVG logo itself */
      .cl-logo-wrap img {
        width: 96px;
        height: 96px;
        filter: drop-shadow(0 0 20px color-mix(in srgb, var(--cl-primary, #06b6d4) 40%, transparent));
        animation: cl-breathe 2.5s ease-in-out infinite;
      }

      /* Orbital ring */
      .cl-orbit {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        animation: cl-spin 2s linear infinite;
      }
      .cl-orbit::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--cl-primary, #06b6d4);
        border-right-color: color-mix(in srgb, var(--cl-primary, #06b6d4) 30%, transparent);
        filter: drop-shadow(0 0 6px color-mix(in srgb, var(--cl-primary, #06b6d4) 50%, transparent));
      }

      /* Second orbital — counter-rotating, accent color */
      .cl-orbit-2 {
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        animation: cl-spin 3.5s linear infinite reverse;
      }
      .cl-orbit-2::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid transparent;
        border-bottom-color: color-mix(in srgb, var(--cl-accent, #a855f7) 50%, transparent);
        border-left-color: color-mix(in srgb, var(--cl-accent, #a855f7) 15%, transparent);
      }

      /* Brand name */
      .cl-brand {
        margin-top: 32px;
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--cl-text-primary, #f1f5f9);
        background: linear-gradient(
          90deg,
          var(--cl-text-primary, #f1f5f9) 0%,
          var(--cl-primary-light, #22d3ee) 50%,
          var(--cl-text-primary, #f1f5f9) 100%
        );
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: cl-shimmer 2.5s ease infinite;
        z-index: 2;
      }

      /* Status line */
      .cl-status {
        margin-top: 16px;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 1px;
        color: var(--cl-text-muted, #64748b);
        opacity: 0;
        animation: cl-fadein 0.8s ease 0.5s forwards;
        z-index: 2;
      }
      .cl-status .cl-dot {
        display: inline-block;
        width: 4px;
        height: 4px;
        margin-left: 2px;
        border-radius: 50%;
        background: var(--cl-text-muted, #64748b);
        vertical-align: middle;
        animation: cl-blink 1.4s ease-in-out infinite;
      }
      .cl-status .cl-dot:nth-child(2) { animation-delay: 0.2s; }
      .cl-status .cl-dot:nth-child(3) { animation-delay: 0.4s; }

      /* Keyframes */
      @keyframes cl-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes cl-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes cl-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes cl-fadein {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes cl-blink {
        0%, 80%, 100% { opacity: 0.2; }
        40% { opacity: 1; }
      }
      @keyframes cl-ambient {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 1; }
      }
    </style>

    <div id="root">
      <!-- Loading screen — automatically replaced when React mounts -->
      <div id="cl-loader">
        <div class="cl-logo-wrap">
          <!-- Orbital rings -->
          <div class="cl-orbit"></div>
          <div class="cl-orbit-2"></div>
          <!-- Club logo (icons.svg) for instant render -->
          <img src="/icons.svg" alt="Cyberlogic" />
        </div>
        <div class="cl-brand">Cyberlogic</div>
        <div class="cl-status">
          Initializing secure portal
          <span class="cl-dot"></span>
          <span class="cl-dot"></span>
          <span class="cl-dot"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
